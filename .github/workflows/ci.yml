name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up JDK 17 (required for Spark/Delta)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest tests/ -v

  example:
    name: examples/minimal-medallion end-to-end
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The example pins Fabric Runtime 1.3 deps (Spark 3.5 / Delta 3.2),
        # which target Python 3.13. The framework itself is tested on 3.13+3.14
        # in the `test` job above.
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install package + Fabric-matching deps
        run: |
          python -m pip install --upgrade pip
          # Editable local package, then the example's Fabric Runtime 1.3 pins
          # (pyspark 3.5.7 / delta-spark 3.2.1). The pins downgrade the package's
          # looser floors so local execution matches Fabric.
          pip install -e .
          pip install -r examples/minimal-medallion/requirements.txt

      - name: Generate notebooks for the example
        working-directory: examples/minimal-medallion
        run: pyfabric-generate --project-root .

      - name: Assert no pyfabric_dev imports leak into generated notebooks
        working-directory: examples/minimal-medallion
        run: |
          if grep -rE "^(import pyfabric_dev|from pyfabric_dev)" \
              bronze/ silver/ gold/ common/ 2>/dev/null; then
            echo "::error::Generated notebooks must not contain pyfabric_dev imports — the generator must strip them."
            exit 1
          fi

      - name: Run the pipeline end-to-end (stage data, then bronze → silver → gold)
        working-directory: examples/minimal-medallion
        env:
          # GitHub-hosted runners have ~7GB total memory; dial the JVM heap down
          # from the 8GB default so Spark doesn't get OOM-killed.
          FABRIC_DEV_DRIVER_MEMORY: 2g
          FABRIC_DEV_DRIVER_MAX_RESULT_SIZE: 1g
          FABRIC_DEV_EXECUTOR_MEMORY: 2g
        run: |
          python stage_data.py
          pyfabric-run-pipeline --project-root . sales_etl

      - name: Run example's tests
        working-directory: examples/minimal-medallion
        env:
          # Serialize workers so consecutive Spark sessions don't fight for the
          # JVM heap on the memory-constrained runner.
          FABRIC_DEV_DRIVER_MEMORY: 2g
          FABRIC_DEV_DRIVER_MAX_RESULT_SIZE: 1g
          FABRIC_DEV_EXECUTOR_MEMORY: 2g
        run: pyfabric-test --project-root . --config config/test_batches.json --max-workers 1
